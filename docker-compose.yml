services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/app
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - projects:/projects
    depends_on:
      - mariadb
    command: >
      sh -c "php artisan serve --host=0.0.0.0 --port=8000 --env=docker"
    networks:
      - skillr

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: skillr
      MARIADB_USER: skillr
      MARIADB_PASSWORD: secret
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - skillr

volumes:
  mariadb_data:
  projects:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECTS_HOST_PATH:-.}

networks:
  skillr:
    driver: bridge
